<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingressos - CineManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="./css/style.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div id="navbar"></div>

    <main class="container py-4">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 mb-4">
            <div>
                <h2 class="mb-1">Ingressos</h2>
                <p class="text-muted mb-0">Registre compras ligando cliente + sessão + assento.</p>
            </div>

            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalIngresso" data-acao="novo">
                Novo Ingresso
            </button>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Filme/Sessão</th>
                        <th>Assento</th>
                        <th>Pagamento</th>
                        <th>Valor</th>
                        <th>Compra</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaIngressos"></tbody>
            </table>
        </div>
    </main>

    <div class="modal fade" id="modalIngresso" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="tituloModalIngresso">Ingresso</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>

                <div class="modal-body">
                    <form id="formIngresso">
                        <input type="hidden" id="idIngresso">

                        <div class="mb-3">
                            <label class="form-label" for="idCliente">Cliente</label>
                            <select class="form-select" id="idCliente" required></select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="idSessao">Sessão</label>
                            <select class="form-select" id="idSessao" required></select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="assento">Assento</label>
                            <input type="text" class="form-control" id="assento" maxlength="10" placeholder="Ex.: A10" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="formaPagamento">Forma de pagamento</label>
                            <select class="form-select" id="formaPagamento" required>
                                <option value="">Selecione</option>
                                <option value="Pix">Pix</option>
                                <option value="Dinheiro">Dinheiro</option>
                                <option value="Cartão de débito">Cartão de débito</option>
                                <option value="Cartão de crédito">Cartão de crédito</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="valorPago">Valor pago</label>
                            <input type="number" class="form-control" id="valorPago" min="0" step="0.01" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="dataCompra">Data da compra</label>
                            <input type="datetime-local" class="form-control" id="dataCompra">
                            <div class="form-text">Se deixar em branco, o sistema usa a data/hora atual.</div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Salvar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./js/ingressos.js"></script>
</body>

</html>
