<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessões - CineManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="./css/style.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div id="navbar"></div>

    <main class="container py-4">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 mb-4">
            <div>
                <h2 class="mb-1">Sessões</h2>
                <p class="text-muted mb-0">Cadastre sessões vinculadas aos filmes.</p>
            </div>

            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalSessao" data-acao="novo">
                Nova Sessão
            </button>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Filme</th>
                        <th>Data/Hora</th>
                        <th>Sala</th>
                        <th>Preço</th>
                        <th>Ingressos vendidos</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaSessoes"></tbody>
            </table>
        </div>
    </main>

    <div class="modal fade" id="modalSessao" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="tituloModalSessao">Sessão</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>

                <div class="modal-body">
                    <form id="formSessao">
                        <input type="hidden" id="idSessao">

                        <div class="mb-3">
                            <label class="form-label" for="idFilme">Filme</label>
                            <select class="form-select" id="idFilme" required></select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="dataHora">Data e Hora</label>
                            <input type="datetime-local" class="form-control" id="dataHora" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="sala">Sala</label>
                            <input type="number" class="form-control" id="sala" min="1" step="1" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="preco">Preço</label>
                            <input type="number" class="form-control" id="preco" min="0" step="0.01" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="ingressos">Ingressos vendidos</label>
                            <input type="number" class="form-control" id="ingressos" min="0" step="1" value="0" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Salvar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./js/sessoes.js"></script>
</body>

</html>
