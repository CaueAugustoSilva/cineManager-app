<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filmes - CineManager</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="./css/style.css" rel="stylesheet" />
  </head>

  <body class="bg-light">
    <div id="navbar"></div>

    <main class="container py-4">
      <div
        class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 mb-4"
      >
        <div>
          <h2 class="mb-1">Catálogo de Filmes</h2>
          <p class="text-muted mb-0">
            CRUD completo da tabela <strong>filmes</strong> com consultas
            dinâmicas.
          </p>
        </div>

        <div class="d-flex flex-column flex-sm-row gap-2">
          <button
            class="btn btn-primary"
            data-bs-toggle="modal"
            data-bs-target="#modalConsultaFilmes"
          >
            Consultar Filmes
          </button>

          <button
            class="btn btn-success"
            data-bs-toggle="modal"
            data-bs-target="#modalFilme"
            data-acao="novo"
          >
            Cadastrar Novo Filme
          </button>
        </div>
      </div>

      <div class="card mb-4 d-none" id="cardRelatorioFilmes">
        <div class="card-body">
          <div
            class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 mb-3"
          >
            <div>
              <h5 class="mb-1" id="tituloRelatorioFilmes">
                Resultado da consulta
              </h5>
              <p class="text-muted mb-0" id="subtituloRelatorioFilmes"></p>
            </div>

            <button
              class="btn btn-outline-secondary btn-sm"
              id="btnLimparRelatorioFilmes"
              type="button"
            >
              Limpar consulta
            </button>
          </div>

          <div id="resultadoRelatorioFilmes"></div>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
          <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>Título</th>
              <th>Gênero</th>
              <th>Duração</th>
              <th>Classificação</th>
              <th>Diretor</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabelaFilmes"></tbody>
        </table>
      </div>
    </main>

    <div
      class="modal fade"
      id="modalConsultaFilmes"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Consulta de Filmes</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Fechar"
            ></button>
          </div>

          <div class="modal-body">
            <p class="text-muted">Escolha qual relatório deseja gerar:</p>

            <div class="d-grid gap-2">
              <button
                class="btn btn-outline-primary text-start"
                id="btnAbrirConsultaGenero"
                type="button"
              >
                <strong>Filtrar por Gênero</strong><br />
                <span class="text-muted"
                  >Escolha um gênero cadastrado e veja todos os filmes
                  correspondentes.</span
                >
              </button>

              <button
                class="btn btn-outline-warning text-start"
                id="btnConsultaFilmesMaisVendidos"
                type="button"
              >
                <strong>Filmes Mais Vendidos</strong><br />
                <span class="text-muted"
                  >Lista filmes com faturamento acima de R$ 1.000,00.</span
                >
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="modalGenerosFilmes"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Escolha o Gênero</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Fechar"
            ></button>
          </div>

          <div class="modal-body">
            <p class="text-muted">
              Selecione um dos gêneros disponíveis no sistema:
            </p>
            <div class="d-grid gap-2" id="listaGenerosFilmes"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="modalFilme" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="tituloModalFilme">Filme</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Fechar"
            ></button>
          </div>

          <div class="modal-body">
            <form id="formFilme">
              <input type="hidden" id="idFilme" />

              <div class="mb-3">
                <label class="form-label" for="titulo">Título</label>
                <input
                  type="text"
                  class="form-control"
                  id="titulo"
                  maxlength="150"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label" for="genero">Gênero</label>
                <input
                  type="text"
                  class="form-control"
                  id="genero"
                  maxlength="80"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label" for="duracao"
                  >Duração em minutos</label
                >
                <input
                  type="number"
                  class="form-control"
                  id="duracao"
                  min="1"
                  step="1"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label" for="classificacao"
                  >Classificação</label
                >
                <select class="form-select" id="classificacao" required>
                  <option value="">Selecione</option>
                  <option value="Livre">Livre</option>
                  <option value="10">10</option>
                  <option value="12">12</option>
                  <option value="14">14</option>
                  <option value="16">16</option>
                  <option value="18">18</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label" for="diretor">Diretor</label>
                <input
                  type="text"
                  class="form-control"
                  id="diretor"
                  maxlength="120"
                  required
                />
              </div>

              <button type="submit" class="btn btn-primary w-100">
                Salvar
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./js/filmes.js"></script>
  </body>
</html>
