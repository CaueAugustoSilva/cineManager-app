<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmes - CineManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="./css/style.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div id="navbar"></div>

    <main class="container py-4">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 mb-4">
            <div>
                <h2 class="mb-1">Catálogo de Filmes</h2>
                <p class="text-muted mb-0">CRUD completo da tabela <strong>filmes</strong>.</p>
            </div>

            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalFilme" data-acao="novo">
                Cadastrar Novo Filme
            </button>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Título</th>
                        <th>Gênero</th>
                        <th>Duração</th>
                        <th>Classificação</th>
                        <th>Diretor</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaFilmes"></tbody>
            </table>
        </div>
    </main>

    <div class="modal fade" id="modalFilme" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="tituloModalFilme">Filme</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>

                <div class="modal-body">
                    <form id="formFilme">
                        <input type="hidden" id="idFilme">

                        <div class="mb-3">
                            <label class="form-label" for="titulo">Título</label>
                            <input type="text" class="form-control" id="titulo" maxlength="150" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="genero">Gênero</label>
                            <input type="text" class="form-control" id="genero" maxlength="80" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="duracao">Duração em minutos</label>
                            <input type="number" class="form-control" id="duracao" min="1" step="1" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="classificacao">Classificação</label>
                            <select class="form-select" id="classificacao" required>
                                <option value="">Selecione</option>
                                <option value="Livre">Livre</option>
                                <option value="10">10</option>
                                <option value="12">12</option>
                                <option value="14">14</option>
                                <option value="16">16</option>
                                <option value="18">18</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="diretor">Diretor</label>
                            <input type="text" class="form-control" id="diretor" maxlength="120" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Salvar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./js/filmes.js"></script>
</body>

</html>
